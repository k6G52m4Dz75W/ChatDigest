; ============================================================
; IMA 一键入库配置模板
; 用法：把本文件复制为同目录的 ima_config.ini，再填写下面的值。
; （ima_config.ini 已加入 .gitignore，不会随仓库提交 / 不会泄露你的知识库 ID）
; 注意：等号前后可加空格；值里不要加引号；以 ; 开头的行是注释，可忽略。
; ============================================================

; 目标知识库 ID（必填）
;   在 ima.qq.com 知识库设置里查看，形如一串 base64 长串。
;   脚本会在写入前自动校验该库是否当前账号可写。
;   同时被 ima_upload.py / ima_watcher.py 默认读取（作为 --kb-id）；手动传参优先覆盖。
KB_ID =

; 默认来源文件夹（可选）
;   双击 bat 且不拖放任何文件时，导入此文件夹内的所有 .md（仅一层，不递归）。
;   留空则必须拖放文件 / 文件夹到 bat 上才会执行。
;   同时被 ima_watcher.py 目录监视模式默认读取为监视目录（仍无则 %USERPROFILE%\Downloads；Mac / Linux 等价 ~/Downloads）。
;   例：SRC = C:\Users\你的用户名\Downloads\ChatDigest
SRC =

; Python 可执行文件完整路径（强烈建议必填）
;   bat 默认会探测 PATH 里的 python / py，但 Miniconda 默认安装不注册为
;   系统 python、也不加 PATH，`where python` 在这种机器上找的是 Microsoft
;   Store 壳子或其他不相干的 python —— 根本不是你的 miniconda。
;   也就是说：如果你用的是 miniconda / venv，**不写 PY= 一定踩坑**。
;
;   请填完整路径，指向你已经装好 tools/requirements.txt 依赖的那个 python：
;     ① Miniconda 基础环境：
;        PY = C:\Users\你的用户名\miniconda3\python.exe
;     ② 某个 conda 虚拟环境（推荐，依赖隔离）：
;        PY = C:\Users\你的用户名\miniconda3\envs\你的env名\python.exe
;     ③ venv：
;        PY = C:\某个项目路径\.venv\Scripts\python.exe
;   不知道 env 路径的话，在 miniconda 里跑 `conda env list` 会列出全部。
;
;   改完 PY= 后请双击 bat 试一下；bat 会立刻报告是否仍缺依赖。
PY =
