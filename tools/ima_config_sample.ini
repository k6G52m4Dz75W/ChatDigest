; ============================================================
; IMA 一键入库配置模板
; 用法：把本文件复制为同目录的 ima_config.ini，再填写下面的值。
; （ima_config.ini 已加入 .gitignore，不会随仓库提交 / 不会泄露你的知识库 ID）
; 注意：等号前后可加空格；值里不要加引号；以 ; 开头的行是注释，可忽略。
; ============================================================

; 目标知识库 ID（必填）
;   在 ima.qq.com 知识库设置里查看，形如一串 base64 长串。
;   脚本会在写入前自动校验该库是否当前账号可写。
;   同时被 ima_upload.py / ima_watcher.py 默认读取（作为 --kb-id）；手动传参优先覆盖。
KB_ID =

; 默认来源文件夹（可选）
;   双击 bat 且不拖放任何文件时，导入此文件夹内的所有 .md（仅一层，不递归）。
;   留空则必须拖放文件 / 文件夹到 bat 上才会执行。
;   同时被 ima_watcher.py 目录监视模式默认读取为监视目录（仍无则 %USERPROFILE%\Downloads；Mac / Linux 等价 ~/Downloads）。
;   例：SRC = C:\Users\你的用户名\Downloads\ChatDigest
SRC =

; Python 可执行文件完整路径（可选）
;   默认会自动探测 python / py。
;   若你的 Python 是 Miniconda 且未注册为默认 python（PATH 里没有 python），
;   请填完整路径，例如：
;   PY = C:\Users\你的用户名\miniconda3\python.exe
;   或某个虚拟环境：
;   PY = C:\Users\你的用户名\miniconda3\envs\myenv\python.exe
PY =
